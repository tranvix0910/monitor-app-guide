apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: wineapp-infra-alerts
  namespace: wineapp
  labels:
    release: prometheus # Important: Matches kube-prometheus-stack selector
spec:
  groups:
    # Application / Pod Down Alerts
    - name: application_alerts
      rules:
        # Alert when Backend is down
        - alert: BackendPodDown
          expr: absent(up{pod=~".*backend.*", namespace="wineapp"}) or up{pod=~".*backend.*", namespace="wineapp"} == 0
          for: 1m
          labels:
            severity: critical
            namespace: wineapp
          annotations:
            summary: "Backend Pod is down"
            description: "The Backend Pod has been down for more than 1 minute."

        # Alert when Frontend is down
        - alert: FrontendPodDown
          expr: absent(up{pod=~".*frontend.*", namespace="wineapp"}) or up{pod=~".*frontend.*", namespace="wineapp"} == 0
          for: 1m
          labels:
            severity: critical
            namespace: wineapp
          annotations:
            summary: "Frontend Pod is down"
            description: "The Frontend Pod has been down for more than 1 minute."

        # Alert when Mongo is down
        - alert: MongoPodDown
          expr: absent(up{pod=~".*mongo.*", namespace="wineapp"}) or up{pod=~".*mongo.*", namespace="wineapp"} == 0
          for: 1m
          labels:
            severity: critical
            namespace: wineapp
          annotations:
            summary: "Mongo Database is down"
            description: "The MongoDB Pod has been down for more than 1 minute."

    # Resource Alerts (CPU/RAM)
    - name: resource_alerts
      rules:
        # Alert when CPU > 80%
        - alert: HighCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total{container!="", container!="POD", namespace="wineapp"}[2m])) by (pod) > 0.8
          for: 2m
          labels:
            severity: warning
            namespace: wineapp
          annotations:
            summary: "High CPU Usage on Pod"
            description: "Pod {{ $labels.pod }} is using more than 80% CPU."

        # Alert when Memory > 80% of limit
        - alert: HighMemoryUsage
          expr: sum(container_memory_usage_bytes{container!="", container!="POD", namespace="wineapp"}) by (pod) / sum(container_spec_memory_limit_bytes{container!="", container!="POD", namespace="wineapp"} > 0) by (pod) > 0.8
          for: 2m
          labels:
            severity: warning
            namespace: wineapp
          annotations:
            summary: "High Memory Usage on Pod"
            description: "Pod {{ $labels.pod }} is consuming more than 80% of its memory limit."
